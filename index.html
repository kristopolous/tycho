<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYCHO | Create Targeted Promos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tac+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header class="hero">
            <h1 class="brand-text">TYCHO</h1>
            <p>Generate actor-specific promotional content from your media titles</p>
        </header>

        <section class="content-form">
            <div class="input-group">
                <div class="input-wrapper">
                    <label for="imdbId">IMDb Title ID</label>
                    <input type="text" id="imdbId" placeholder="e.g., tt0058331" pattern="tt\d+" required>
                </div>
                <div class="input-wrapper">
                    <label for="videoPath">Video File Path</label>
                    <input type="text" id="videoPath" placeholder="content.mp4" value="content.mp4">
                </div>
                <div class="input-wrapper">
                    <label for="harnessSelect">Harness</label>
                    <select id="harnessSelect" class="harness-select">
                        <option value="tiktok">TikTok (High Energy)</option>
                        <option value="instagram">Instagram (Aesthetic)</option>
                        <option value="pack">Creator Pack (Kit)</option>
                    </select>
                </div>
                <button id="findContent" class="primary-btn" disabled>Find Content</button>
            </div>
            <p class="input-hint">Enter an IMDb ID to fetch cast information and find actors in your video.</p>
        </section>

        <section class="process-status hidden" id="processStatus">
            <h3>Processing</h3>
            <div class="process-steps" id="processSteps"></div>
        </section>

        <section class="content-details hidden" id="contentDetails">
            <h2 id="contentTitle"></h2>
            <div class="actors-grid" id="actorsGrid"></div>
        </section>

        <hr class="section-divider">
