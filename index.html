<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYCHO | Create Targeted Promos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tac+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header class="hero">
            <h1 class="brand-text">TYCHO</h1>
            <p>Monetize archival media via AI-driven social funnels</p>
        </header>

        <section class="content-form">
            <div class="input-group">
                <div class="input-wrapper">
                    <label for="imdbId">IMDb Title ID</label>
                    <input type="text" id="imdbId" placeholder="e.g., tt0058331" pattern="tt\d+" required>
                </div>
                <div class="input-wrapper">
                    <label for="videoSource">Video Source</label>
                    <div class="video-input-group">
                        <input type="text" id="videoPath" placeholder="Path or URL" value="content.mp4">
                        <label for="videoUpload" class="upload-btn-label">
                            <span>Upload</span>
                            <input type="file" id="videoUpload" class="hidden" accept="video/*">
                        </label>
                    </div>
                </div>
                <div class="input-wrapper">
                    <label for="channelSelect">Channel</label>
                    <select id="channelSelect" class="harness-select">
                        <option value="tiktok">TikTok (9:16)</option>
                        <option value="instagram">Instagram (1:1)</option>
                        <option value="youtube">YouTube (16:9)</option>
                        <option value="threads">Threads (RAW)</option>
                    </select>
                </div>
                <div class="input-wrapper">
                    <label for="harnessSelect">Harness</label>
                    <select id="harnessSelect" class="harness-select">
                        <option value="nostalgia">Nostalgia (Character)</option>
                        <option value="hype">Hype (Action)</option>
                        <option value="creator_kit">Creator Kit (Raw)</option>
                    </select>
                </div>
                <button id="findContent" class="primary-btn" disabled>Find Content</button>
            </div>
            <p class="input-hint">Map IMDb metadata to your video archives and generate optimized social assets.</p>
        </section>

        <section class="process-status hidden" id="processStatus">
            <h3>Processing</h3>
            <div class="process-steps" id="processSteps"></div>
        </section>

        <section class="content-details hidden" id="contentDetails">
            <h2 id="contentTitle"></h2>
            <div class="actors-grid" id="actorsGrid"></div>
        </section>

        <hr class="section-divider">

    </main>

    <script src="app.js"></script>
</body>
</html>
