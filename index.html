<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tycho | Create Targeted Promos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header class="hero">
            <h1>Create Targeted Promos</h1>
            <p>Generate actor-specific promotional content from your media titles</p>
        </header>

        <section class="content-form">
            <div class="input-group">
                <label for="imdbId">IMDB Title ID</label>
                <input type="text" id="imdbId" placeholder="Enter IMDB ID (e.g., tt0111161)" 
                       pattern="tt\d+" required>
                <button id="findContent" class="primary-btn">Find Content</button>
            </div>
        </section>

        <section class="content-details hidden" id="contentDetails">
            <h2 id="contentTitle"></h2>
            <div class="actors-grid" id="actorsGrid"></div>
        </section>

        <section class="generation-status hidden" id="generationStatus">
            <h3>Generation Status</h3>
            <div class="status-list" id="statusList"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
